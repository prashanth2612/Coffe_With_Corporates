<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <!-- Coffee cup icon -->
  <g>
    <!-- Steam wisps -->
    <path d="M9 10 C8 7, 11 5, 10 2" stroke="#7C5230" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M13 9 C12 6, 15 4, 14 1" stroke="#7C5230" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M17 10 C16 7, 19 5, 18 2" stroke="#7C5230" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Cup body -->
    <path d="M5 14 L23 14 L21 36 Q20 40 14 40 Q8 40 7 36 Z" fill="#6F4E37"/>
    <!-- Light rim -->
    <rect x="5" y="14" width="18" height="5" rx="1" fill="#8B6347"/>
    <!-- Handle -->
    <path d="M23 18 Q30 18 30 26 Q30 34 23 34" stroke="#6F4E37" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Saucer -->
    <ellipse cx="14" cy="41" rx="12" ry="3" fill="#6F4E37" opacity="0.35"/>
  </g>
  <!-- Main brand text -->
  <text x="38" y="26" font-family="Georgia, 'Book Antiqua', Palatino, serif" font-size="13" font-weight="700" fill="#2C1810" letter-spacing="0.3">Coffee With</text>
  <text x="38" y="46" font-family="Georgia, 'Book Antiqua', Palatino, serif" font-size="16" font-weight="700" fill="#6F4E37" letter-spacing="1.2">Corporates</text>
  <!-- Decorative underline -->
  <line x1="38" y1="50" x2="252" y2="50" stroke="#D4A96A" stroke-width="1.5" opacity="0.6"/>
</svg>
